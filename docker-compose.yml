version: "3.9"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./model_repository:/models
    command: tritonserver --model-repository=/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  api:
    build: .
    ports:
      - "8002:8002"
    depends_on:
      - triton